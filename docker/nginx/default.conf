server {
    listen 80;
    server_name api.m-search.tw1.su;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://api.m-search.tw1.su$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.m-search.tw1.su;

    ssl_certificate /etc/letsencrypt/live/api.m-search.tw1.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.m-search.tw1.su/privkey.pem;

    root /var/www/html/public;
    index index.php;

    # Debug: serve test.html
    location = /test.html {
        alias /var/www/html/public/test.html;
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        internal;
    }

    location ~ \.php$ {
        return 404;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}
