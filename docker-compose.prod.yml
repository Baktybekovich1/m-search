services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: msearch-php-prod
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: prod
      DATABASE_URL: "postgresql://app:${POSTGRES_PASSWORD:-aowfhwopjfijanfoawkf}@postgresql:5432/app?serverVersion=16&charset=utf8"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: msearch-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - .:/var/www/html
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - php
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: msearch-certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  postgresql:
    image: postgres:16.2-alpine3.18
    container_name: msearch-db-prod
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aowfhwopjfijanfoawkf}
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  db-data:
  certbot-www:
